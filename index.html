<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Skills Test</title>
    <link rel="stylesheet" href="styles.css">
    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
</head>
<body>
    <div class="container rounded mt-5">
    <h1>CINE SOPHIA TICKETS</h1>
        <hr>    
        <form>
        <h3>Student Details</h3>
    
            <label class="FullName">Full Name: </label>
            <input type="Text" class="form-control">
            <hr>
        <h3>Ticket Selection</h3>
            <label class="Ticket Selection">Quantity: </label>
            <input type="number" class="form-control" id="quantity">

        <hr>
        <h3>Payment Details</h3>
            <label class="Payment">SubTotal:
            </label><input type="number" readonly value="0.00" class="form-control" id="subtotal">
            </label>
            <label class="Payment">Admin Fee:
            <input type="number" readonly value="50.00" class="form-control" id="adminfee">
            </label><br>
            <label class="Payment">Total Fee:
            <input type="number" readonly value="0.00" id="total" class="form-control">
            </label>
            <hr>
        
     <button class="btn btn-danger mt-3" type="button"onclick="getPrice()">Total</button>
    
      <button type="button" class="btn btn-danger mt-3 text-center" onclick="window.location.reload()">Refresh</button>
  
        </form>

    </div>

   <script src=main.js></script>

    
</body>
</html>
